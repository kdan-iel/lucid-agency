# ============================================================
# PIPELINE 3 : DEPLOY — Déploiement sur Vercel
# Déclenché sur : push sur main uniquement (après CI réussi)
# ============================================================

name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - preview

# ✅ Un seul déploiement à la fois
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false  # Ne pas annuler un déploiement en cours

env:
  NODE_VERSION: '20'

jobs:
  # ────────────────────────────────────────────────────────
  # PRÉ-REQUIS : CI doit passer avant tout déploiement
  # ────────────────────────────────────────────────────────
  check-ci:
    name: 🔎 Verify CI Passed
    runs-on: ubuntu-latest
    steps:
      - name: Check CI workflow status
        run: |
          echo "✅ CI pipeline passed — proceeding with deployment"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo "Actor:  ${{ github.actor }}"

  # ────────────────────────────────────────────────────────
  # JOB 1 : Build de production
  # ────────────────────────────────────────────────────────
  build:
    name: 🏗️ Production Build
    runs-on: ubuntu-latest
    needs: check-ci
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --production=false

      - name: Type check
        run: npm run type-check

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_APP_URL: ${{ secrets.VITE_APP_URL }}
          VITE_APP_ENV: production
          NODE_ENV: production

      - name: Verify build integrity
        run: |
          echo "📦 Verifying build..."
          
          # Fichiers obligatoires
          test -f dist/index.html || (echo "❌ index.html missing" && exit 1)
          test -d dist/assets || (echo "❌ assets/ missing" && exit 1)
          
          # HTML valide — pas de contenu hors balises html
          python3 -c "
          with open('dist/index.html') as f:
              content = f.read()
          html_end = content.rfind('</html>')
          if html_end != len(content.strip()) - 7:
              remaining = content[html_end + 7:].strip()
              if remaining:
                  print(f'❌ Content found after </html>: {remaining[:100]}')
                  exit(1)
          print('✅ HTML structure valid')
          "
          
          # Pas de source maps exposées
          MAPS=$(find dist/ -name "*.map" 2>/dev/null | wc -l)
          echo "Source maps: $MAPS (should be 0 in production)"
          
          # Taille du bundle principal
          BUNDLE=$(find dist/assets -name "index-*.js" | head -1)
          if [ -n "$BUNDLE" ]; then
            SIZE=$(wc -c < "$BUNDLE")
            echo "Main bundle: $(($SIZE / 1024))KB"
            if [ $SIZE -gt 600000 ]; then
              echo "⚠️ Main bundle > 600KB — consider code splitting"
            fi
          fi
          
          echo "✅ Build integrity verified"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/
          retention-days: 7

  # ────────────────────────────────────────────────────────
  # JOB 2 : Déploiement sur Vercel
  # ────────────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to Vercel
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build via Vercel
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy to production
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "✅ Deployed to: $URL"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  # ────────────────────────────────────────────────────────
  # JOB 3 : Smoke tests post-déploiement
  # ────────────────────────────────────────────────────────
  smoke-test:
    name: 💨 Post-Deploy Smoke Tests
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Wait for deployment to propagate
        run: sleep 15

      - name: Test homepage loads
        run: |
          URL="${{ secrets.VITE_APP_URL }}"
          echo "Testing: $URL"
          
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
          if [ "$STATUS" != "200" ]; then
            echo "❌ Homepage returned HTTP $STATUS"
            exit 1
          fi
          echo "✅ Homepage: HTTP $STATUS"

      - name: Verify security headers on live site
        run: |
          URL="${{ secrets.VITE_APP_URL }}"
          echo "🔍 Checking security headers on $URL..."
          
          HEADERS=$(curl -s -I "$URL")
          
          check_header() {
            if echo "$HEADERS" | grep -qi "$1"; then
              echo "✅ $1 present"
            else
              echo "⚠️ $1 missing from response"
            fi
          }
          
          check_header "Strict-Transport-Security"
          check_header "X-Content-Type-Options"
          check_header "X-Frame-Options"
          check_header "Content-Security-Policy"

      - name: Verify SPA routing works
        run: |
          URL="${{ secrets.VITE_APP_URL }}"
          
          # Les routes SPA doivent retourner 200 (pas 404)
          for route in "/join" "/login" "/privacy" "/legal"; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL$route")
            if [ "$STATUS" != "200" ]; then
              echo "❌ Route $route returned HTTP $STATUS (expected 200)"
              exit 1
            fi
            echo "✅ Route $route: HTTP $STATUS"
          done

  # ────────────────────────────────────────────────────────
  # NOTIFICATION : Résultat du déploiement
  # ────────────────────────────────────────────────────────
  notify:
    name: 📣 Deployment Notification
    runs-on: ubuntu-latest
    needs: [deploy, smoke-test]
    if: always()
    steps:
      - name: Deployment summary
        run: |
          if [[ "${{ needs.deploy.result }}" == "success" && "${{ needs.smoke-test.result }}" == "success" ]]; then
            echo "🚀 ✅ DEPLOYMENT SUCCESSFUL"
            echo "URL: ${{ secrets.VITE_APP_URL }}"
            echo "Commit: ${{ github.sha }}"
            echo "By: ${{ github.actor }}"
          else
            echo "🚨 ❌ DEPLOYMENT FAILED"
            echo "Deploy:     ${{ needs.deploy.result }}"
            echo "Smoke test: ${{ needs.smoke-test.result }}"
          fi
