# ============================================================
# PIPELINE 4 : PR CHECK — Vérifications sur les Pull Requests
# Déclenché sur : ouverture/mise à jour d'une PR
# ============================================================

name: PR Quality Check

on:
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  issues: write
  pull-requests: write

env:
  # Placeholders de build uniquement. Les previews ne doivent pas dépendre de secrets Supabase.
  VITE_SUPABASE_URL: https://placeholder.supabase.co
  VITE_SUPABASE_ANON_KEY: placeholder_key

jobs:
  # ────────────────────────────────────────────────────────
  # JOB 1 : Vérifier la taille de la PR
  # ────────────────────────────────────────────────────────
  pr-size:
    name: 📏 PR Size Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check PR size
        run: |
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | wc -l)
          LINES=$(git diff origin/${{ github.base_ref }}...HEAD --stat | tail -1)

          echo "Files changed: $CHANGED"
          echo "Stats: $LINES"

          if [ $CHANGED -gt 50 ]; then
            echo "⚠️ Large PR: $CHANGED files changed. Consider splitting into smaller PRs."
          else
            echo "✅ PR size is acceptable"
          fi

  # ────────────────────────────────────────────────────────
  # JOB 2 : Vérifier que les tests passent sur la PR
  # ────────────────────────────────────────────────────────
  test-pr:
    name: 🧪 Tests on PR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:ci

      - name: Comment test results on PR
        uses: actions/github-script@v7
        if: always()
        continue-on-error: true
        with:
          script: |
            const status = '${{ job.status }}';
            const emoji = status === 'success' ? '✅' : '❌';

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## ${emoji} Test Results\n**Status:** ${status}\n**Commit:** ${context.sha.slice(0,7)}`
            });

  # ────────────────────────────────────────────────────────
  # JOB 3 : Preview deploy sur Vercel
  # ────────────────────────────────────────────────────────
  preview-deploy:
    name: 👁️ Preview Deployment
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check preview prerequisites
        id: preview-check
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [ "${{ github.event.pull_request.head.repo.fork }}" = "true" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "reason=Preview skipped for forked pull requests" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -z "$VERCEL_TOKEN" ] || [ -z "$VERCEL_ORG_ID" ] || [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "reason=Preview skipped because Vercel secrets are missing" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "ready=true" >> "$GITHUB_OUTPUT"
          echo "reason=Preview prerequisites satisfied" >> "$GITHUB_OUTPUT"

      - name: Install Vercel CLI
        if: steps.preview-check.outputs.ready == 'true'
        run: npm install -g vercel@latest

      - name: Deploy preview
        id: preview
        if: steps.preview-check.outputs.ready == 'true'
        run: |
          vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
          vercel build --token=${{ secrets.VERCEL_TOKEN }}
          URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "✅ Preview URL: $URL"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Preview skipped notice
        if: steps.preview-check.outputs.ready != 'true'
        run: echo "${{ steps.preview-check.outputs.reason }}"

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        if: always() && steps.preview-check.outputs.ready == 'true'
        continue-on-error: true
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 👁️ Preview Deployment\n**URL:** ${{ steps.preview.outputs.url }}\n**Branch:** ${context.payload.pull_request.head.ref}\n**Commit:** ${context.sha.slice(0,7)}`
            });
