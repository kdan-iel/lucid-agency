<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ✅ CSP stricte — bloque les injections XSS et scripts externes non autorisés -->
    <meta http-equiv="Content-Security-Policy"
content="
default-src 'self';
script-src 'self' 'unsafe-eval' 'unsafe-inline';
style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
font-src 'self' https://fonts.gstatic.com data:;
img-src 'self' data: https:;
connect-src 'self' ws: wss: https:;
">
    />

    <!-- ✅ Empêche le MIME sniffing -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />

    <!-- ✅ Bloque le clickjacking via iframe -->
    <!-- <meta http-equiv="X-Frame-Options" content="DENY" /> -->

    <!-- ✅ XSS auditor (anciens navigateurs) -->
    <meta http-equiv="X-XSS-Protection" content="1; mode=block" />

    <!-- ✅ Contrôle referer — ne fuite pas l'URL complète -->
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <!-- ✅ Désactive détection de numéro de téléphone sur iOS (privacy) -->
    <meta name="format-detection" content="telephone=no" />

    <!-- SEO -->
    <meta name="description" content="LUCID Agency — Plateforme de mise en relation entre clients et freelancers créatifs en Afrique de l'Ouest." />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph -->
    <meta property="og:title" content="LUCID Agency" />
    <meta property="og:description" content="Marketing Digital : Passez de l'ombre à la lumière." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/logo.png" />

    <title>LUCID Agency</title>
    <link rel="icon" type="image/png" href="/logo.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:..." rel="stylesheet">
</html>
